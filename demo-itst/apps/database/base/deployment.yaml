apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  labels:
    app: postgresql
    app.openshift.io/runtime: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel8/postgresql-15:latest
          imagePullPolicy: "IfNotPresent"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                configMapKeyRef:
                  name: database-params
                  key: DB_USER
            - name: POSTGRESQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: database-params
                  key: DB_NAME
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: database-params
                  key: DB_PASS
