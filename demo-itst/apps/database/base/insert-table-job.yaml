apiVersion: batch/v1
kind: Job
metadata:
  name: insert-table-job
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    app: insert-table-job
    app.openshift.io/runtime: other-linux
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: insert-table-job
          image: quay.io/rhn_consulting_kemori/insert_table_demoapl:latest
          imagePullPolicy: Always
          env:
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: database-params
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: database-params
                  key: DB_PASS
            - name: DB_SERVERNAME
              valueFrom:
                configMapKeyRef:
                  name: database-params
                  key: DB_HOST
            - name: DB_PORTNUMBER
              valueFrom:
                configMapKeyRef:
                  name: database-params
                  key: DB_PORT
